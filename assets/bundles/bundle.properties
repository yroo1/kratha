#drill
block.kratha-crusher-drill.name = Crusher Drill
block.kratha-crusher-drill.description = Crushes ore cluster to extract its resources. Requires power.\n\n[accent]Click to configure which ore cluster to drill. A single ore cluster can only be mined by a limited amount of Crusher Drills at once depending on its size.
block.kratha-laser-bore.name = Laser Bore
block.kratha-laser-bore.description = Extracts ore from walls. Requires power.\n\n[accent]Each beam can mine up to 2 layers of wall ores at a time. Can mine through environmental walls.
block.kratha-cliff-bore.name = Cliff Bore
block.kratha-cliff-bore.description = Mines sand from certain walls.

